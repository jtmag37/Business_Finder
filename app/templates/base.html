<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1a6b3c">
  <title>{% block title %}RV & MHP Finder{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
  <div class="container-fluid px-3">
    <a class="navbar-brand fw-bold" href="{{ url_for('main.index') }}">
      <i class="bi bi-geo-alt-fill me-1"></i>RV &amp; MHP Finder
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.index' %}active{% endif %}"
             href="{{ url_for('main.index') }}"><i class="bi bi-speedometer2"></i> Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.listings' %}active{% endif %}"
             href="{{ url_for('main.listings') }}"><i class="bi bi-list-ul"></i> Listings</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('main.listings') }}?favorites=1">
            <i class="bi bi-star-fill text-warning"></i> Favorites
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.scraper_status' %}active{% endif %}"
             href="{{ url_for('main.scraper_status') }}"><i class="bi bi-activity"></i> Scrapers</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.settings' %}active{% endif %}"
             href="{{ url_for('main.settings') }}"><i class="bi bi-gear"></i> Settings</a>
        </li>
      </ul>
      <div class="d-flex gap-2">
        <form method="POST" action="{{ url_for('main.trigger_scrape') }}">
          <button class="btn btn-sm btn-outline-light" title="Run all scrapers now">
            <i class="bi bi-arrow-clockwise"></i> <span class="d-none d-md-inline">Scrape Now</span>
          </button>
        </form>
        <a class="btn btn-sm btn-outline-light" href="{{ url_for('main.export_csv') }}" title="Export CSV">
          <i class="bi bi-download"></i>
        </a>
      </div>
    </div>
  </div>
</nav>

<div class="container-fluid px-3 py-3">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
